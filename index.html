<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENAI</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SENAI" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a73e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      color: white;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      color: #1a73e8;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
    }

    p {
      font-size: 14px;
      opacity: 0.8;
      text-align: center;
      max-width: 280px;
    }

    .spinner {
      width: 40px;
      height: 40px;
    }

    .spinner circle {
      stroke: white;
      stroke-width: 4;
      fill: none;
      stroke-dasharray: 80;
      stroke-dashoffset: 60;
      stroke-linecap: round;
      transform-origin: center;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn {
      margin-top: 8px;
      background: white;
      color: #1a73e8;
      border: none;
      padding: 14px 32px;
      border-radius: 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      display: none;
    }

    .btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <div class="logo">S</div>
  <h1>SENAI</h1>
  <svg class="spinner" id="spinner" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="16"/>
  </svg>
  <p id="msg">Redirecionando para o app...</p>
  <button class="btn" id="btn-abrir" onclick="abrirApp()">Abrir App</button>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz_Tesh0J2lJudDTFB3xwvuRB3l-9qYOJ956yXNmfHguKb1q2o1r2_w3W6P_odsJSWa5A/exec";

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    function abrirApp() {
      window.location.href = GAS_URL;
    }

    // Redireciona automaticamente após 1.5s
    // Dá tempo do PWA "abrir" antes de sair
    setTimeout(() => {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').textContent = 'Abrindo...';
      document.getElementById('btn-abrir').style.display = 'block';
      window.location.href = GAS_URL;
    }, 1500);
  </script>
</body>
</html>
